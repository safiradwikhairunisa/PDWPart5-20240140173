<!DOCTYPE html>
<html>
<head>
    <link href="index.css" rel="stylesheet">
    <meta charset="utf-8">
    <title>Table HTML</title>
</head>
<body>
    <center>
        <h1>TABEL MAKANAN & MINUMAN</h1>
    </center>
    <center>
        <p id="judul">Daftar Makanan & Minuman</p>
    </center>

    <center>
        <table style="margin-left:auto;margin-right:auto;" border="padding" cellpadding="10">
            <tr style="background-color: #FFD54F;">
                <td><p id="jdl">No</p></td>
                <td><p id="jdl">Nama</p></td>
                <td><p id="jdl">Harga</p></td>
                <td><p id="jdl">Jumlah</p></td>
            </tr>
            <tr>
                <td><p id="member">1</p></td>
                <td><p id="mnama">Nasi Goreng</p></td>
                <td><p id="mharga">Rp 20.000</p></td>
                <td><p id="mjumlah"> </p></td>
            </tr>
            <tr>
                <td><p id="member">2</p></td>
                <td><p id="mnama">Mie Goreng</p></td>
                <td><p id="mharga">Rp 20.000</p></td>
                <td><p id="mjumlah"> </p></td>
            </tr>
            <tr>
                <td><p id="member">3</p></td>
                <td><p id="mnama">Es Teh</p></td>
                <td><p id="mharga">Rp 5.000</p></td>
                <td><p id="mjumlah"> </p></td>
            </tr>
            <tr>
                <td><p id="member">4</p></td>
                <td><p id="mnama">Es Jeruk</p></td>
                <td><p id="mharga">Rp 5.000</p></td>
                <td><p id="mjumlah"> </p></td>
            </tr>
            <tr>
                <td><p id="member">5</p></td>
                <td><p id="mnama">Kopi Susu</p></td>
                <td><p id="mharga">Rp 7.000</p></td>
                <td><p id="mjumlah"> </p></td>
            </tr>
            <tr>
                <td colspan="5"><p id="jdl">Total: </p></td>
            </tr>
        </table>
    </center>
</body>
</html>
